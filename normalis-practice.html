<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Normalis — Practice Mode</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg1:#0a0d12; --bg2:#111520; --bg3:#1a1f2e; --bg4:#222840;
    --green:#22c55e; --green-dim:#14532d;
    --amber:#f59e0b; --amber-dim:#78350f;
    --red:#ef4444;   --red-dim:#7f1d1d;
    --blue:#60a5fa;  --orange:#fb923c;
    --slate:#64748b; --text:#e2e8f0; --text-muted:#64748b; --border:#1e2a3a;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background:var(--bg1); color:var(--text);
    font-family:'DM Sans',sans-serif;
    height:100dvh; overflow:hidden;
    display:flex; flex-direction:column;
  }

  .screen { display:none; flex-direction:column; height:100dvh; }
  .screen.active { display:flex; }

  /* ══ SELECT SCREEN ══════════════════════════════════════════════════════════ */

  .sel-header {
    padding:48px 18px 14px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }

  .logo-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }

  .logo-mark {
    width:28px; height:28px;
    border:1.5px solid var(--blue); border-radius:6px;
    display:flex; align-items:center; justify-content:center;
  }

  .logo-mark svg { width:14px; height:14px; }

  .logo-text {
    font-family:'DM Mono',monospace;
    font-size:11px; letter-spacing:.12em; color:var(--text-muted);
  }

  .sel-header h1 {
    font-size:20px; font-weight:300; letter-spacing:-.02em;
    color:var(--text); margin-bottom:3px;
  }

  .sel-header p { font-size:12px; color:var(--text-muted); line-height:1.4; }

  /* two columns */
  .cols {
    flex:1; overflow:hidden;
    display:grid; grid-template-columns:1fr 1fr;
  }

  .col {
    display:flex; flex-direction:column; overflow:hidden;
    border-right:1px solid var(--border);
  }

  .col:last-child { border-right:none; }

  .col-head {
    padding:9px 10px 8px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }

  .col-title {
    font-family:'DM Mono',monospace;
    font-size:9px; letter-spacing:.1em; text-transform:uppercase; font-weight:500;
  }

  .col-fo .col-title { color:var(--orange); }
  .col-dtl .col-title { color:var(--blue); }

  .col-cnt {
    font-family:'DM Mono',monospace;
    font-size:10px; color:var(--text-muted);
  }

  .col-cnt span { color:var(--text); font-weight:500; }

  .col-list {
    flex:1; overflow-y:auto;
    padding:6px; display:flex; flex-direction:column; gap:5px;
  }

  /* check cards */
  .chk {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:7px; padding:8px 9px;
    cursor:pointer;
    transition:border-color .12s, background .12s;
  }

  .chk.fail-c { border-left:3px solid var(--red); }
  .chk.warn-c { border-left:3px solid var(--amber); }
  .chk.pass-c { border-left:3px solid var(--green-dim); }

  .chk.sel { background:#0d1829; }
  .col-fo  .chk.sel { border-color:var(--orange); }
  .col-dtl .chk.sel { border-color:var(--blue); }

  .chk.dim { opacity:.3; cursor:not-allowed; }

  .chk-top {
    display:flex; align-items:flex-start;
    justify-content:space-between; gap:5px; margin-bottom:3px;
  }

  .chk-name {
    font-size:12px; font-weight:500; color:var(--text);
    line-height:1.25; flex:1; min-width:0;
  }

  .chk-circle {
    width:15px; height:15px; border-radius:50%;
    border:1.5px solid var(--slate);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; margin-top:1px;
    transition:all .12s;
  }

  .chk.sel .chk-circle { background:var(--blue); border-color:var(--blue); }
  .col-fo .chk.sel .chk-circle { background:var(--orange); border-color:var(--orange); }

  .chk-circle svg { display:none; }
  .chk.sel .chk-circle svg { display:block; }

  .chk-bot {
    display:flex; align-items:center;
    justify-content:space-between; gap:4px;
  }

  .chk-range {
    font-size:9px; font-family:'DM Mono',monospace;
    color:var(--text-muted);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;
  }

  .pip {
    font-size:8px; font-weight:500; padding:1px 5px;
    border-radius:3px; font-family:'DM Mono',monospace;
    text-transform:uppercase; letter-spacing:.05em; flex-shrink:0;
  }

  .p-fail { background:var(--red-dim);   color:var(--red); }
  .p-warn { background:var(--amber-dim); color:var(--amber); }
  .p-pass { background:var(--green-dim); color:var(--green); }

  /* footer */
  .sel-footer {
    padding:10px 16px 28px;
    border-top:1px solid var(--border);
    background:var(--bg1); flex-shrink:0;
  }

  .foot-row {
    display:grid; grid-template-columns:1fr 1fr;
    gap:8px; margin-bottom:10px;
  }

  .foot-cnt {
    font-family:'DM Mono',monospace;
    font-size:10px; color:var(--text-muted); text-align:center;
  }

  .foot-cnt .n { font-size:15px; font-weight:500; }
  .fo-n  { color:var(--orange); }
  .dtl-n { color:var(--blue); }

  .btn-go {
    width:100%; padding:14px;
    background:var(--blue); color:#0a0d12;
    border:none; border-radius:10px;
    font-size:14px; font-weight:500;
    font-family:'DM Sans',sans-serif;
    cursor:pointer; transition:opacity .15s;
  }

  .btn-go:disabled { opacity:.3; cursor:not-allowed; }
  .btn-go:not(:disabled):active { opacity:.8; }

  /* ══ CAMERA SCREEN ══════════════════════════════════════════════════════════ */

  #screen-cam { position:relative; background:#000; }

  #video {
    width:100%; height:100%;
    object-fit:cover; transform:scaleX(-1);
  }

  #pose-canvas {
    position:absolute; inset:0;
    width:100%; height:100%;
    pointer-events:none; transform:scaleX(-1);
  }

  .cam-head {
    position:absolute; top:0; left:0; right:0;
    padding:48px 16px 14px;
    background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,transparent 100%);
    display:flex; align-items:center; gap:10px; z-index:10;
  }

  .cam-back {
    width:34px; height:34px; border-radius:50%;
    background:rgba(255,255,255,.12); border:none;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }

  .cam-ttl {
    font-family:'DM Mono',monospace; font-size:11px;
    letter-spacing:.1em; color:rgba(255,255,255,.6); text-transform:uppercase;
  }

  .view-tog {
    position:absolute; top:106px; left:50%;
    transform:translateX(-50%); z-index:10;
    display:flex;
    background:rgba(0,0,0,.6);
    border:1px solid rgba(255,255,255,.12);
    border-radius:8px; overflow:hidden;
    backdrop-filter:blur(8px);
  }

  .vtb {
    padding:8px 22px; font-size:12px; font-weight:500;
    font-family:'DM Mono',monospace; letter-spacing:.06em;
    border:none; background:transparent;
    color:rgba(255,255,255,.4); cursor:pointer; transition:all .15s;
  }

  .vtb.afo  { background:var(--orange); color:#000; }
  .vtb.adtl { background:var(--blue);   color:#000; }

  /* badges */
  .badges {
    position:absolute; right:14px; top:50%;
    transform:translateY(-50%);
    z-index:10; display:flex; flex-direction:column; gap:10px;
  }

  .badge {
    background:rgba(0,0,0,.82);
    border:2px solid rgba(255,255,255,.12);
    border-radius:14px; padding:12px 14px; min-width:108px;
    backdrop-filter:blur(12px);
    transition:border-color .2s, background .2s, opacity .2s;
  }

  .badge.pass { border-color:var(--green);  background:rgba(34,197,94,.14); }
  .badge.warn { border-color:var(--amber);  background:rgba(245,158,11,.14); }
  .badge.fail { border-color:var(--red);    background:rgba(239,68,68,.14); }
  .badge.off  { opacity:.28; border-color:rgba(255,255,255,.07); }

  .b-lbl {
    font-size:10px; font-family:'DM Mono',monospace;
    color:rgba(255,255,255,.5); margin-bottom:5px;
    display:flex; align-items:center; gap:5px;
    white-space:nowrap; overflow:hidden;
  }

  .b-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--slate); flex-shrink:0;
  }

  .badge.pass .b-dot { background:var(--green); }
  .badge.warn .b-dot { background:var(--amber); }
  .badge.fail .b-dot { background:var(--red); }

  .b-val {
    font-size:26px; font-weight:500;
    font-family:'DM Mono',monospace; color:#fff;
    line-height:1; margin-bottom:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .badge.pass .b-val { color:var(--green); }
  .badge.warn .b-val { color:var(--amber); }
  .badge.fail .b-val { color:var(--red); }

  .b-rng {
    font-size:9px; color:rgba(255,255,255,.3);
    font-family:'DM Mono',monospace;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* desktop */
  @media (hover:hover) and (pointer:fine) {
    .badges { right:28px; gap:16px; }
    .badge  { padding:18px 22px; min-width:155px; border-radius:18px; }
    .b-lbl  { font-size:12px; margin-bottom:8px; }
    .b-val  { font-size:46px; margin-bottom:6px; }
    .b-rng  { font-size:11px; }
    .b-dot  { width:9px; height:9px; }
  }

  /* status bar */
  .cam-foot {
    position:absolute; bottom:0; left:0; right:0;
    padding:14px 18px 36px;
    background:linear-gradient(to top,rgba(0,0,0,.72) 0%,transparent 100%);
    z-index:10;
  }

  .s-row {
    display:flex; align-items:center; justify-content:center;
    gap:7px; margin-bottom:10px;
  }

  .s-dot { width:7px; height:7px; border-radius:50%; background:var(--slate); }
  .s-dot.det  { background:var(--amber); animation:pulse 1s infinite; }
  .s-dot.live { background:var(--green); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .s-txt {
    font-size:11px; font-family:'DM Mono',monospace;
    color:rgba(255,255,255,.4);
  }

  .all-pass {
    background:rgba(34,197,94,.14); border:1px solid var(--green);
    border-radius:8px; padding:9px 14px;
    text-align:center; font-size:13px; font-weight:500;
    color:var(--green); display:none;
  }

  .all-pass.show { display:block; }

  .pose-hint {
    position:absolute; bottom:114px; left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.1);
    border-radius:8px; padding:7px 14px;
    font-size:11px; color:rgba(255,255,255,.5);
    font-family:'DM Mono',monospace;
    white-space:nowrap; z-index:10; transition:opacity .3s;
  }

  .pose-hint.hidden { opacity:0; pointer-events:none; }

  /* loading */
  #loading {
    position:absolute; inset:0; background:var(--bg1);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; z-index:20;
  }

  #loading.hidden { display:none; }

  .l-ring {
    width:38px; height:38px;
    border:2px solid var(--border); border-top-color:var(--blue);
    border-radius:50%; animation:spin .8s linear infinite;
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  .l-txt { font-size:12px; font-family:'DM Mono',monospace; color:var(--text-muted); }
</style>
</head>
<body>

<!-- ══ SELECT ═══════════════════════════════════════════════════════════════ -->
<div id="screen-sel" class="screen active">

  <div class="sel-header">
    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6" stroke="#60a5fa" stroke-width="1.5"/>
          <line x1="8" y1="2" x2="8" y2="14" stroke="#60a5fa" stroke-width="1.5"/>
          <line x1="4" y1="5" x2="12" y2="11" stroke="#60a5fa" stroke-width="1"/>
        </svg>
      </div>
      <span class="logo-text">NORMALIS</span>
    </div>
    <h1>Practice mode</h1>
    <p>Pick up to 3 checks per view. Both sets run live simultaneously.</p>
  </div>

  <div class="cols">
    <div class="col col-fo">
      <div class="col-head">
        <span class="col-title">Face-on</span>
        <span class="col-cnt"><span id="fo-n">0</span>/3</span>
      </div>
      <div class="col-list" id="list-fo"></div>
    </div>
    <div class="col col-dtl">
      <div class="col-head">
        <span class="col-title">Down-the-line</span>
        <span class="col-cnt"><span id="dtl-n">0</span>/3</span>
      </div>
      <div class="col-list" id="list-dtl"></div>
    </div>
  </div>

  <div class="sel-footer">
    <div class="foot-row">
      <div class="foot-cnt">
        <span class="n fo-n" id="fo-big">0</span>/3
        <span style="color:var(--orange)"> face-on</span>
      </div>
      <div class="foot-cnt">
        <span class="n dtl-n" id="dtl-big">0</span>/3
        <span style="color:var(--blue)"> DTL</span>
      </div>
    </div>
    <button class="btn-go" id="btn-go" disabled onclick="startCam()">
      Start practice
    </button>
  </div>

</div>

<!-- ══ CAMERA ════════════════════════════════════════════════════════════════ -->
<div id="screen-cam" class="screen">

  <video id="video" playsinline autoplay muted></video>
  <canvas id="pose-canvas"></canvas>

  <div id="loading">
    <div class="l-ring"></div>
    <div class="l-txt">Loading pose engine...</div>
  </div>

  <div class="cam-head">
    <button class="cam-back" onclick="goBack()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7L9 12" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="cam-ttl">Practice mode</span>
  </div>

  <div class="view-tog">
    <button class="vtb afo" id="btn-fo" onclick="setView('fo')">Face-on</button>
    <button class="vtb"     id="btn-dtl" onclick="setView('dtl')">DTL</button>
  </div>

  <div class="badges" id="badges"></div>

  <div class="pose-hint" id="pose-hint">Step back so full body is visible</div>

  <div class="cam-foot">
    <div class="s-row">
      <div class="s-dot det" id="s-dot"></div>
      <span class="s-txt" id="s-txt">Detecting pose...</span>
    </div>
    <div class="all-pass" id="all-pass">Address locked — all checks passing</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
// ── BASELINE (replace with real API checks array) ─────────────────────────────
const CHECKS = [
  // face_on
  {id:'shoulder_tilt',        name:'Shoulder tilt',       view:'fo',  status:'warn', range:'2–8° lead higher'},
  {id:'shoulder_rotation',    name:'Shoulder rotation',   view:'fo',  status:'pass', range:'Square to 5° closed'},
  {id:'lead_arm_rotation',    name:'Lead arm rotation',   view:'fo',  status:'pass', range:'0–5°'},
  {id:'trail_arm_rotation',   name:'Trail arm rotation',  view:'fo',  status:'warn', range:'0–10°'},
  {id:'grip_overlap',         name:'Grip overlap',        view:'fo',  status:'warn', range:'On/within 5mm'},
  {id:'hip_tilt',             name:'Hip tilt',            view:'fo',  status:'pass', range:'Lead 0–4° higher'},
  {id:'hip_rotation',         name:'Hip rotation',        view:'fo',  status:'pass', range:'Square to 5° open'},
  {id:'stance_width',         name:'Stance width',        view:'fo',  status:'pass', range:'0.9–1.15x shoulder'},
  {id:'lead_foot_flare',      name:'Lead foot flare',     view:'fo',  status:'warn', range:'20–35°'},
  {id:'trail_foot_flare',     name:'Trail foot flare',    view:'fo',  status:'pass', range:'0–15°'},
  {id:'head_position',        name:'Head position',       view:'fo',  status:'pass', range:'Over/3in behind ball'},
  {id:'ball_position',        name:'Ball position',       view:'fo',  status:'pass', range:'Centre to 2 widths fwd'},
  // dtl
  {id:'spine_angle',          name:'Spine angle',         view:'dtl', status:'warn', range:'35–45°'},
  {id:'hip_hinge',            name:'Hip hinge',           view:'dtl', status:'warn', range:'Backside behind heels'},
  {id:'posture_type',         name:'Posture type',        view:'dtl', status:'pass', range:'Neutral'},
  {id:'trail_shoulder',       name:'Trail shoulder',      view:'dtl', status:'pass', range:'Slightly lower, neutral'},
  {id:'trail_elbow',          name:'Trail elbow',         view:'dtl', status:'fail', range:'Down toward trail hip'},
  {id:'lead_knee_flex',       name:'Lead knee flex',      view:'dtl', status:'pass', range:'12–28°'},
  {id:'trail_knee_flex',      name:'Trail knee flex',     view:'dtl', status:'pass', range:'12–28°'},
  {id:'shoulder_alignment',   name:'Shoulder alignment',  view:'dtl', status:'pass', range:'Square to 5° closed'},
  {id:'general_aim',          name:'General aim',         view:'dtl', status:'pass', range:'±5° of target'},
];

// which check_ids MediaPipe can actually measure
const MEASURABLE = {
  // fo
  shoulder_tilt:      {view:'fo',  label:'Shoulder'},
  trail_arm_rotation: {view:'fo',  label:'Trail elbow'},
  stance_width:       {view:'fo',  label:'Stance'},
  lead_foot_flare:    {view:'fo',  label:'Lead foot'},
  trail_foot_flare:   {view:'fo',  label:'Trail foot'},
  // dtl
  spine_angle:        {view:'dtl', label:'Spine'},
  hip_hinge:          {view:'dtl', label:'Hip hinge'},
  trail_elbow:        {view:'dtl', label:'Trail elbow'},
  lead_knee_flex:     {view:'dtl', label:'Lead knee'},
  trail_knee_flex:    {view:'dtl', label:'Trail knee'},
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const sel = {fo:[], dtl:[]};
let view = 'fo';
let camStream = null;
let mp = null;

// ── LANDMARK INDICES ──────────────────────────────────────────────────────────
const L = {
  LS:11,RS:12, LE:13,RE:14, LW:15,RW:16,
  LH:23,RH:24, LK:25,RK:26, LA:27,RA:28,
  LHe:29,RHe:30, LF:31,RF:32,
};

// ── BUILD SELECTION UI ────────────────────────────────────────────────────────
function buildCols() {
  const fo  = CHECKS.filter(c=>c.view==='fo');
  const dtl = CHECKS.filter(c=>c.view==='dtl');
  const sort = arr => [...arr].sort((a,b)=>{
    const r={fail:0,warn:1,pass:2}; return (r[a.status]??3)-(r[b.status]??3);
  });
  renderCol('list-fo',  sort(fo),  'fo');
  renderCol('list-dtl', sort(dtl), 'dtl');
}

function renderCol(elId, checks, colKey) {
  const el = document.getElementById(elId);
  checks.forEach(c => {
    const can = !!MEASURABLE[c.id];
    const div = document.createElement('div');
    div.className = `chk ${c.status}-c${can?'':' dim'}`;
    div.dataset.id = c.id;
    const pip = {fail:'p-fail',warn:'p-warn',pass:'p-pass'}[c.status]||'';
    div.innerHTML = `
      <div class="chk-top">
        <div class="chk-name">${c.name}</div>
        <div class="chk-circle">
          <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
            <path d="M1 4L3 6.5L7 2" stroke="#0a0d12" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="chk-bot">
        <div class="chk-range">${can ? c.range : 'not live-measurable'}</div>
        <span class="pip ${pip}">${c.status}</span>
      </div>`;
    if (can) div.addEventListener('click', ()=>toggle(c.id, colKey, div));
    el.appendChild(div);
  });
}

function toggle(id, colKey, el) {
  const arr = sel[colKey];
  if (arr.includes(id)) {
    sel[colKey] = arr.filter(x=>x!==id);
    el.classList.remove('sel');
  } else {
    if (arr.length >= 3) return;
    sel[colKey].push(id);
    el.classList.add('sel');
  }
  updateCounts();
}

function updateCounts() {
  const f=sel.fo.length, d=sel.dtl.length;
  document.getElementById('fo-n').textContent   = f;
  document.getElementById('dtl-n').textContent  = d;
  document.getElementById('fo-big').textContent  = f;
  document.getElementById('dtl-big').textContent = d;
  document.getElementById('btn-go').disabled = (f+d)===0;
}

// ── BUILD BADGES ──────────────────────────────────────────────────────────────
function buildBadges() {
  const cont = document.getElementById('badges');
  cont.innerHTML = '';
  ['fo','dtl'].forEach(v => {
    sel[v].forEach(id => {
      const c    = CHECKS.find(x=>x.id===id);
      const meta = MEASURABLE[id];
      const div  = document.createElement('div');
      div.className = 'badge' + (v !== view ? ' off' : '');
      div.id = 'b-'+id;
      div.dataset.v = v;
      div.innerHTML = `
        <div class="b-lbl"><span class="b-dot"></span>${meta.label}</div>
        <div class="b-val" id="bv-${id}">—</div>
        <div class="b-rng">${c.range}</div>`;
      cont.appendChild(div);
    });
  });
}

function setBadge(id, val, status) {
  const b = document.getElementById('b-'+id);
  const v = document.getElementById('bv-'+id);
  if (!b||!v) return;
  const off = b.dataset.v !== view;
  b.className = 'badge' + (off?' off': status?' '+status:'');
  v.textContent = val;
}

function checkAllPass() {
  const vis = [...document.querySelectorAll('.badge')].filter(b=>!b.classList.contains('off'));
  const ok  = vis.length>0 && vis.every(b=>b.classList.contains('pass'));
  document.getElementById('all-pass').classList.toggle('show', ok);
}

// ── ANGLE MATHS ───────────────────────────────────────────────────────────────
function a3(a,b,c) {
  const ab={x:a.x-b.x,y:a.y-b.y}, cb={x:c.x-b.x,y:c.y-b.y};
  const d=ab.x*cb.x+ab.y*cb.y;
  const m=Math.sqrt((ab.x**2+ab.y**2)*(cb.x**2+cb.y**2));
  return m?Math.round(Math.acos(Math.max(-1,Math.min(1,d/m)))*180/Math.PI):0;
}

function tiltV(top,bot) {
  return Math.round(Math.abs(Math.atan2(bot.x-top.x,bot.y-top.y)*180/Math.PI));
}

function avg(a,b,lm) {
  const va=lm[a],vb=lm[b];
  return (va&&vb)?{x:(va.x+vb.x)/2,y:(va.y+vb.y)/2}:va||vb||null;
}

function ok(lm,i) { return lm[i]&&(lm[i].visibility===undefined||lm[i].visibility>0.15); }

// ── COMPUTE ───────────────────────────────────────────────────────────────────
function compute(lm) {
  const R={};
  const mS  = avg(L.LS,L.RS,lm);
  const mH  = avg(L.LH,L.RH,lm);
  const mA  = avg(L.LA,L.RA,lm);

  // spine angle
  if (mS&&mH) { const a=tiltV(mS,mH); R.spine_angle={d:`${a}°`,s:a>=35&&a<=45?'pass':a>=28&&a<=55?'warn':'fail'}; }

  // hip hinge (DTL) — ankle.x - hip.x: positive = backside behind heels (toward camera from trail side)
  if (mH&&mA) {
    const o=mA.x-mH.x;
    R.hip_hinge={d:o>0.06?'good':o>0.02?'barely':'fwd',s:o>0.06?'pass':o>0.02?'warn':'fail'};
  }

  // trail elbow (dtl) — right arm joint angle
  const rOk=ok(lm,L.RS)&&ok(lm,L.RE)&&ok(lm,L.RW);
  const lOk=ok(lm,L.LS)&&ok(lm,L.LE)&&ok(lm,L.LW);
  if (rOk) { const a=a3(lm[L.RS],lm[L.RE],lm[L.RW]); R.trail_elbow={d:`${a}°`,s:a>=150?'pass':a>=120?'warn':'fail'}; }
  else if (lOk) { const a=a3(lm[L.LS],lm[L.LE],lm[L.LW]); R.trail_elbow={d:`${a}°`,s:a>=150?'pass':a>=120?'warn':'fail'}; }

  // trail arm rotation (fo proxy — same elbow angle measurement)
  if (rOk) { const a=a3(lm[L.RS],lm[L.RE],lm[L.RW]); R.trail_arm_rotation={d:`${a}°`,s:a>=150?'pass':a>=120?'warn':'fail'}; }

  // knee flex
  if (ok(lm,L.LH)&&ok(lm,L.LK)&&ok(lm,L.LA)) { const f=180-a3(lm[L.LH],lm[L.LK],lm[L.LA]); R.lead_knee_flex={d:`${f}°`,s:f>=12&&f<=28?'pass':f>=8&&f<=38?'warn':'fail'}; }
  if (ok(lm,L.RH)&&ok(lm,L.RK)&&ok(lm,L.RA)) { const f=180-a3(lm[L.RH],lm[L.RK],lm[L.RA]); R.trail_knee_flex={d:`${f}°`,s:f>=12&&f<=28?'pass':f>=8&&f<=38?'warn':'fail'}; }

  // shoulder tilt (fo)
  if (ok(lm,L.LS)&&ok(lm,L.RS)) {
    const deg=Math.round(Math.atan2(Math.abs(lm[L.LS].y-lm[L.RS].y),Math.abs(lm[L.LS].x-lm[L.RS].x))*180/Math.PI);
    const lHi=lm[L.RS].y<lm[L.LS].y;
    R.shoulder_tilt={d:`${deg}°`,s:lHi&&deg>=2&&deg<=8?'pass':deg<=12?'warn':'fail'};
  }

  // foot flare (fo)
  // MediaPipe processes the RAW (unflipped) camera feed. For a right-handed golfer
  // facing the camera, their LEFT foot (lead) appears on the RIGHT side of the raw
  // feed → MediaPipe labels it R. Their RIGHT foot (trail) appears on LEFT → labelled L.
  // So: lead = R landmarks, trail = L landmarks.
  //
  // In raw feed coords: lead (R) toe flares RIGHT → toe.x > heel.x → dx = toe.x - heel.x > 0
  //                     trail (L) toe flares LEFT → heel.x > toe.x → dx = heel.x - toe.x > 0
  const leadHe=ok(lm,L.RHe)?lm[L.RHe]:(ok(lm,L.RA)?lm[L.RA]:null);
  const leadFt=ok(lm,L.RF)?lm[L.RF]:null;
  if (leadHe&&leadFt) {
    const dx=leadFt.x-leadHe.x;
    const f=Math.round(Math.atan2(Math.max(0,dx),Math.max(.001,Math.abs(leadHe.y-leadFt.y)))*180/Math.PI);
    R.lead_foot_flare={d:`${f}°`,s:f>=20&&f<=35?'pass':f>=10&&f<=45?'warn':'fail'};
  }

  const trailHe=ok(lm,L.LHe)?lm[L.LHe]:(ok(lm,L.LA)?lm[L.LA]:null);
  const trailFt=ok(lm,L.LF)?lm[L.LF]:null;
  if (trailHe&&trailFt) {
    const dx=trailHe.x-trailFt.x;
    const f=Math.round(Math.atan2(Math.max(0,dx),Math.max(.001,Math.abs(trailHe.y-trailFt.y)))*180/Math.PI);
    R.trail_foot_flare={d:`${f}°`,s:f>=0&&f<=15?'pass':f<=25?'warn':'fail'};
  }

  // stance width (fo)
  const lH2=ok(lm,L.LHe)?lm[L.LHe]:(ok(lm,L.LA)?lm[L.LA]:null);
  const rH2=ok(lm,L.RHe)?lm[L.RHe]:(ok(lm,L.RA)?lm[L.RA]:null);
  if (lH2&&rH2&&ok(lm,L.LS)&&ok(lm,L.RS)) {
    const fw=Math.abs(lH2.x-rH2.x), sw=Math.abs(lm[L.LS].x-lm[L.RS].x);
    if (sw>0.05) { const r=Math.round(fw/sw*100)/100; R.stance_width={d:`${r}x`,s:r>=0.9&&r<=1.15?'pass':r>=0.7&&r<=1.3?'warn':'fail'}; }
  }

  return R;
}

// ── SKELETON ──────────────────────────────────────────────────────────────────
function drawSkel(canvas,lm) {
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const w=canvas.width,h=canvas.height;
  const pt=i=>({x:lm[i].x*w,y:lm[i].y*h});
  const v=i=>ok(lm,i);
  const bones=[
    [L.LS,L.RS],[L.LS,L.LE],[L.LE,L.LW],[L.RS,L.RE],[L.RE,L.RW],
    [L.LS,L.LH],[L.RS,L.RH],[L.LH,L.RH],
    [L.LH,L.LK],[L.LK,L.LA],[L.RH,L.RK],[L.RK,L.RA],
    [L.LA,L.LF],[L.RA,L.RF],[L.LA,L.LHe],[L.RA,L.RHe],
  ];
  ctx.strokeStyle='rgba(96,165,250,.5)'; ctx.lineWidth=2.5; ctx.lineCap='round';
  bones.forEach(([a,b])=>{ if(!v(a)||!v(b))return; ctx.beginPath(); ctx.moveTo(pt(a).x,pt(a).y); ctx.lineTo(pt(b).x,pt(b).y); ctx.stroke(); });
  [L.LS,L.RS,L.LE,L.RE,L.LH,L.RH,L.LK,L.RK,L.LA,L.RA].forEach(i=>{
    if(!v(i))return; ctx.beginPath(); ctx.arc(pt(i).x,pt(i).y,4,0,Math.PI*2); ctx.fillStyle='rgba(96,165,250,.8)'; ctx.fill();
  });
}

// ── MEDIAPIPE ─────────────────────────────────────────────────────────────────
async function initMP() {
  return new Promise((res,rej)=>{
    const pose=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    pose.setOptions({modelComplexity:1,smoothLandmarks:true,enableSegmentation:false,minDetectionConfidence:.45,minTrackingConfidence:.45});
    pose.onResults(r=>{
      const canvas=document.getElementById('pose-canvas');
      const video=document.getElementById('video');
      canvas.width=video.videoWidth||canvas.offsetWidth;
      canvas.height=video.videoHeight||canvas.offsetHeight;

      if (r.poseLandmarks&&r.poseLandmarks.length>0) {
        drawSkel(canvas,r.poseLandmarks);
        const C=compute(r.poseLandmarks);

        // update all selected badges (both views computed, only visible set is active)
        ['fo','dtl'].forEach(v=>{
          sel[v].forEach(id=>{
            const res=C[id];
            setBadge(id,res?res.d:'?',res?res.s:'');
          });
        });

        checkAllPass();
        document.getElementById('pose-hint').classList.add('hidden');
        document.getElementById('s-dot').className='s-dot live';
        document.getElementById('s-txt').textContent='Pose detected';
      } else {
        const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height);
        [...sel.fo,...sel.dtl].forEach(id=>setBadge(id,'—',''));
        document.getElementById('pose-hint').classList.remove('hidden');
        document.getElementById('s-dot').className='s-dot det';
        document.getElementById('s-txt').textContent='Detecting pose...';
      }
    });
    pose.initialize().then(()=>res(pose)).catch(rej);
  });
}

// ── CAMERA ────────────────────────────────────────────────────────────────────
async function startCam() {
  document.getElementById('screen-sel').classList.remove('active');
  document.getElementById('screen-cam').classList.add('active');
  buildBadges();
  const video=document.getElementById('video');
  const ov=document.getElementById('loading');
  try {
    camStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1920,min:640},height:{ideal:1080,min:480},frameRate:{ideal:30,min:15}},audio:false
    });
  } catch {
    try { camStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false}); }
    catch { ov.querySelector('.l-txt').textContent='Camera access denied'; return; }
  }
  video.srcObject=camStream; await video.play();
  try {
    mp=await initMP(); ov.classList.add('hidden');
    const cam=new Camera(video,{onFrame:async()=>{if(mp)await mp.send({image:video})},width:1920,height:1080});
    cam.start();
  } catch(e) { ov.querySelector('.l-txt').textContent='Pose engine failed'; console.error(e); }
}

// ── VIEW TOGGLE ───────────────────────────────────────────────────────────────
function setView(v) {
  view=v;
  document.getElementById('btn-fo').className ='vtb'+(v==='fo' ?' afo':'');
  document.getElementById('btn-dtl').className='vtb'+(v==='dtl'?' adtl':'');
  // flip badge visibility
  document.querySelectorAll('.badge').forEach(b=>b.classList.toggle('off',b.dataset.v!==v));
  document.getElementById('all-pass').classList.remove('show');
}

function goBack() {
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  mp=null;
  document.getElementById('screen-cam').classList.remove('active');
  document.getElementById('screen-sel').classList.add('active');
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('all-pass').classList.remove('show');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildCols();
</script>
